<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trivia Game</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="app player">
    <header>
      <h1>Trivia Game</h1>
      <p id="subtitle">Create or join a room</p>
    </header>

    <div id="screen-home" class="screen">
      <div class="card">
        <h2>Join a game</h2>
        <label for="room-input">Room code</label>
        <input id="room-input" type="text" maxlength="4" placeholder="ABCD" autocapitalize="characters" autocomplete="off">
        <label for="join-name">Your name</label>
        <input id="join-name" type="text" maxlength="20" placeholder="Player name" autocomplete="name">
        <button id="btn-join" class="btn btn-primary btn-block">Join room</button>
        <p id="join-error" class="status-msg error hidden"></p>
      </div>
      <div id="home-create-card" class="card">
        <h2>Create a game</h2>
        <p class="status-msg" style="margin-bottom: 1rem;">
          Sets up the room on this device. Join as a player on another phone.
        </p>
        <button id="btn-create" class="btn btn-secondary btn-block">Create room</button>
        <p id="create-error" class="status-msg error hidden"></p>
      </div>
    </div>

    <div id="screen-lobby" class="screen hidden">
      <div class="card join-panel">
        <div>
          <h2>Room code</h2>
          <div id="room-code" class="room-code">----</div>
          <p class="join-url" id="join-url"></p>
        </div>
        <div id="qr-code"></div>
      </div>
      <div class="card">
        <h2>Players (<span id="player-count">0</span>)</h2>
        <ul id="players-list" class="players-list"></ul>
        <button id="btn-start" class="btn btn-primary btn-block hidden" style="margin-top: 1rem;">Start game</button>
        <p id="lobby-hint" class="status-msg" style="margin-top: 1rem;"></p>
      </div>
    </div>

    <div id="screen-spectate" class="screen hidden">
      <div id="spectate-content" class="card hidden">
        <div id="spectate-timer" class="timer-bar hidden">
          <div class="timer-bar-track"><div class="timer-bar-fill"></div></div>
        </div>
        <div id="spectate-meta" class="question-meta"></div>
        <p id="spectate-question" class="question-text" style="font-size: 1.25rem;"></p>
        <div id="spectate-vote-tally" class="vote-tally hidden"></div>
        <div id="spectate-choices" class="choices-display"></div>
      </div>
      <div class="card">
        <h2>Scores</h2>
        <div id="spectate-scores" class="scoreboard"></div>
      </div>
    </div>

    <div id="screen-waiting" class="screen hidden">
      <div class="card">
        <p id="waiting-msg" class="status-msg"></p>
        <p id="waiting-name" class="status-msg success" style="margin-top: 0.5rem;"></p>
      </div>
    </div>

    <div id="screen-voting" class="screen hidden">
      <div class="card">
        <div id="vote-meta" class="question-meta"></div>
        <p id="vote-prompt" class="question-text" style="font-size: 1.15rem;">Pick the next category</p>
        <div id="vote-timer" class="timer-bar">
          <div class="timer-bar-track"><div class="timer-bar-fill"></div></div>
        </div>
        <div id="vote-options" class="choices-player"></div>
        <p id="vote-status" class="status-msg hidden"></p>
      </div>
      <div class="card">
        <h2>Scores</h2>
        <div id="vote-scores" class="scoreboard"></div>
      </div>
    </div>

    <div id="screen-question" class="screen hidden">
      <div class="card">
        <div id="q-meta" class="question-meta"></div>
        <p id="q-text" class="question-text" style="font-size: 1.25rem;"></p>
        <div id="q-timer" class="timer-bar">
          <div class="timer-bar-track"><div class="timer-bar-fill"></div></div>
        </div>
        <div id="choices" class="choices-player"></div>
        <p id="answer-status" class="status-msg hidden"></p>
      </div>
      <div class="card">
        <h2>Scores</h2>
        <div id="question-scores" class="scoreboard"></div>
      </div>
    </div>

    <div id="screen-finished" class="screen hidden">
      <div class="card question-box">
        <h2 style="color: var(--muted);">Game over</h2>
        <div id="final-rank" class="question-text" style="font-size: 1.25rem; margin-top: 1rem;"></div>
      </div>
      <div class="card">
        <h2>Final scores</h2>
        <div id="final-scores" class="scoreboard"></div>
      </div>
      <button id="btn-new-game" class="btn btn-primary btn-block">Play again</button>
    </div>

    <p class="credit">
      <a href="https://the-trivia-api.com/" target="_blank" rel="noopener">The Trivia API</a>
    </p>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
